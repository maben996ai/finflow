# Windows 开发环境覆盖配置
# Windows + Docker Desktop (WSL2) 无法将宿主机文件事件传递到容器，
# 需强制轮询（polling）以保证 hot reload 正常工作。

services:
  backend:
    environment:
      - WATCHFILES_FORCE_POLLING=true
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app

  frontend:
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=300  # 300ms：平衡响应速度与 CPU 开销的经验值
